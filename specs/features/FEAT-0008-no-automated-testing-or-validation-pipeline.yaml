metadata:
  id: FEAT-0008
  title: No automated testing or validation pipeline
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-07"
  updated_at: "2026-04-07"
  tags:
    - rsi-audit
    - non_functional
    - maintainability
description:
  summary: 'Automated audit finding: No automated testing or validation pipeline'
  problem_statement: |-
    - The repository has a specs/ directory with feature specs but no automated testing to verify that generators produce valid STL outputs or handle edge cases correctly. Changes to core algorithms could break existing functionality without detection.
    - File naming is inconsistent: 'comb-generator.scad' uses hyphens while 'funnel_generator.scad' uses underscores. Directory naming also varies. This makes the project appear less professional and can cause confusion when scripting or batch processing.
  proposed_solution: |-
    - Implement automated testing using OpenSCAD's command-line interface to render test cases and validate outputs. Create a CI pipeline that tests parameter combinations and checks for rendering errors or degenerate geometry.
    - Standardize on either snake_case or kebab-case for all files and directories. Update the main README and any references accordingly. Consider using snake_case to match OpenSCAD community conventions.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
