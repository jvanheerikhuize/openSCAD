metadata:
  id: FEAT-0004
  title: Inconsistent file naming conventions across generators
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-03"
  updated_at: "2026-04-03"
  tags:
    - rsi-audit
    - non_functional
    - maintainability
description:
  summary: 'Automated audit finding: Inconsistent file naming conventions across generators'
  problem_statement: '- The project uses inconsistent naming patterns: Funnel Generator uses ''funnel_generator.scad'', Comb Generator uses ''comb-generator.scad'' (hyphen vs underscore), and Mold Generator uses ''mold_generator.scad''. This inconsistency makes the project harder to navigate and could confuse users about which files belong together.'
  proposed_solution: '- Standardize on either underscores or hyphens across all generators. Update file references in documentation accordingly.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: The Comb Generator/comb-generator.scad file(s) exist in the repository
    when: The changes from this spec are applied
    then: Standardize on either underscores or hyphens across all generators. Update file references in documentation accordingly.
technical_notes: 'Files affected: Comb Generator/comb-generator.scad, Funnel Generator/funnel_generator.scad, Mold Generator/mold_generator.scad'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
    - Verify the fix addresses the identified issue
rollout:
  rollout_strategy: manual
  rollback_plan: Revert the changes introduced by this spec via git revert.
